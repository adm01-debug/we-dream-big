<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security Headers -->
    <!--
      Os cabeçalhos abaixo são entregues como HTTP headers reais via `public/_headers`
      e `vercel.json` (X-Frame-Options, Strict-Transport-Security, Permissions-Policy,
      frame-ancestors da CSP e cabeçalhos relacionados). Aqui mantemos apenas as
      diretivas que funcionam corretamente como <meta http-equiv> — o navegador
      ignora as demais (como Permissions-Policy, removido nesta etapa) e emite
      warnings no console do preview.
    -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <!-- SEO - Título e Meta Tags -->
    <title>Promo Gifts | Catálogo Inteligente de Produtos Promocionais</title>
    <meta name="description" content="Plataforma completa para vendedores de produtos promocionais. Catálogo inteligente, orçamentos rápidos, mockups personalizados e gestão de clientes com IA.">
    <meta name="author" content="Promo Gifts" />
    <meta name="keywords" content="produtos promocionais, brindes corporativos, catálogo promocional, orçamentos, mockups, personalização, bordado, serigrafia, gravação laser" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.promogifts.com.br" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.promogifts.com.br" />
    <meta property="og:title" content="Promo Gifts | Solução Completa para Brindes Corporativos">
    <meta property="og:description" content="Acelere suas vendas de brindes com nosso catálogo inteligente, orçamentos instantâneos em PDF e gerador de mockups com IA.">
    <meta property="og:image" content="https://www.promogifts.com.br/og-image.png">
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Promo Gifts" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.promogifts.com.br" />
    <meta name="twitter:title" content="Promo Gifts | Solução Completa para Brindes Corporativos">
    <meta name="twitter:description" content="Acelere suas vendas de brindes com nosso catálogo inteligente, orçamentos instantâneos em PDF e gerador de mockups com IA.">
    <meta name="twitter:image" content="https://www.promogifts.com.br/og-image.png">

    <!-- DNS Prefetch & Preconnect — reduce network dependency chain -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://doufsxqlfjyuvxuezpln.supabase.co" />
    <link rel="preconnect" href="https://doufsxqlfjyuvxuezpln.supabase.co" crossorigin />
    
    <!-- Load Google Fonts — non-render-blocking via media swap -->
    <!-- Apenas Outfit (display) e Plus Jakarta Sans (sans). Inter foi removido
         (era para "skins Opera GX", overhead desnecessário). display=optional evita CLS. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=optional" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=optional" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=optional" /></noscript>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <!-- Theme Color & PWA -->
    <meta name="theme-color" content="#fb923c" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Promo Gifts",
      "url": "https://www.promogifts.com.br",
      "description": "Plataforma completa para vendedores de produtos promocionais. Catálogo inteligente, orçamentos rápidos e mockups personalizados.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "BRL"
      },
      "author": {
        "@type": "Organization",
        "name": "Promo Gifts"
      }
    }
    </script>
  </head>

  <body style="background-color: #020617;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
