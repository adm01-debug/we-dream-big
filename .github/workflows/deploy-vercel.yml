name: Deploy to Vercel

# Build e deploy automático para Vercel a cada push em main.
# PRs geram preview deploys; main vai para produção.
#
# === GitHub Secrets necessários (Settings → Secrets and variables → Actions) ===
#
# Vercel:
#   - VERCEL_TOKEN     → https://vercel.com/account/tokens
#   - VERCEL_ORG_ID    → cat .vercel/project.json (após `vercel link` local)
#   - VERCEL_PROJECT_ID→ idem
#
# App (injetados no build do Vite):
#   - VITE_SUPABASE_URL
#   - VITE_SUPABASE_PUBLISHABLE_KEY
#   - VITE_SUPABASE_PROJECT_ID
#   - VITE_EXTERNAL_SUPABASE_URL
#   - VITE_EXTERNAL_SUPABASE_ANON_KEY
#   - VITE_CRM_SUPABASE_URL          (opcional)
#   - VITE_CRM_SUPABASE_ANON_KEY     (opcional)
#
# Secrets server-side (edge functions) NÃO entram aqui — vão no painel
# Supabase → Edge Functions → Secrets do projeto principal.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Variáveis VITE_* lidas pelo `vite build` durante o vercel build
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
  VITE_EXTERNAL_SUPABASE_URL: ${{ secrets.VITE_EXTERNAL_SUPABASE_URL }}
  VITE_EXTERNAL_SUPABASE_ANON_KEY: ${{ secrets.VITE_EXTERNAL_SUPABASE_ANON_KEY }}
  VITE_CRM_SUPABASE_URL: ${{ secrets.VITE_CRM_SUPABASE_URL }}
  VITE_CRM_SUPABASE_ANON_KEY: ${{ secrets.VITE_CRM_SUPABASE_ANON_KEY }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        if: github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel environment (preview)
        if: github.ref != 'refs/heads/main'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        if: github.ref == 'refs/heads/main'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (preview)
        if: github.ref != 'refs/heads/main'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main'
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "🚀 Production: $URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Vercel (preview)
        if: github.ref != 'refs/heads/main'
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "👀 Preview: $URL" >> "$GITHUB_STEP_SUMMARY"
