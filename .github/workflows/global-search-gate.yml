name: Global Search Quality Gate

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/components/search/**'
      - 'e2e/flows/global-search-comprehensive.spec.ts'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/components/search/**'
      - 'e2e/flows/global-search-comprehensive.spec.ts'

jobs:
  vitest:
    name: Vitest - Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Global Search component tests with coverage
        run: npx vitest run src/components/search/__tests__ --coverage
      - name: Coverage Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Vitest Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Category | Percentage |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | jq -r '.total | to_entries | .[] | "| \(.key) | \(.value.pct)% |"' >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload Search coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-coverage
          path: coverage/
          retention-days: 7

  playwright:
    name: Playwright - Cross-browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run Search E2E (Multi-browser)
        run: npx playwright test e2e/flows/global-search-comprehensive.spec.ts --project=chromium-authed --project=firefox-authed --project=webkit-authed
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          CI: true
      - name: Detect Flaky & Quarantine
        if: always()
        run: node e2e/scripts/detect-flaky.mjs
      - name: Upload Playwright Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e-artifacts/
          retention-days: 7
      - name: Upload Quarantine List
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarantine-list
          path: quarantine-list.json
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: search-e2e-report
          path: playwright-report/
          retention-days: 7
