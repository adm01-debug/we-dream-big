name: Credentials Audit

on:
  pull_request:
    paths:
      - 'supabase/functions/**/*.ts'
      - 'scripts/audit-credentials.mjs'
      - '.audit-credentials-baseline.json'
      - '.github/workflows/credentials-audit.yml'
  push:
    branches: [main]

jobs:
  audit:
    name: Static analysis of credential handling
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run credentials audit
        run: node scripts/audit-credentials.mjs --baseline .audit-credentials-baseline.json
