name: E2E (Playwright)

# Job opcional: roda os specs públicos sempre; specs autenticados só se
# E2E_USER_EMAIL/E2E_USER_PASSWORD estiverem configurados como secrets do repo.
# Artefatos (relatório HTML, screenshots, vídeos, traces) são publicados.
# T14 UPDATE 13 (2026-05-24): corrige if: conditions inválidas (test -f → steps.outcome)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # T14 UPDATE 4: precisa contents:write para o auto-debug commit do
    # diagnóstico em docs/redeploy/T14-AUTO-DEBUG.md via gh api.
    permissions:
      contents: write
    env:
      CI: "true"
      # Logs limpos no GitHub Actions: sem códigos ANSI no console output
      # (relatório HTML continua colorido). Reporters dedicados (github/list)
      # cuidam da formatação amigável.
      FORCE_COLOR: "0"
      # Falha imediatamente se algum spec ainda tiver `test.only` esquecido.
      PWTEST_FORBID_ONLY: "1"
      # VITE_* são valores "publishable" (já embutidos no bundle de browser em
      # todo deploy). Precisam ser injetados no webServer (`npm run dev`) para
      # que o Supabase client inicialize sem lançar "supabaseUrl is required"
      # — o que derrubava todos os smoke tests públicos (90-95, issue #167).
      # Fallback = valores públicos do projeto (URL + chave publishable não-JWT);
      # secret sobrescreve quando configurado.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      ARTIFACT_RETENTION_DAYS: "14"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      # Pré-gera fixtures de E2E (permissões-matrix → JSON) antes de qualquer
      # step do Playwright. Separa essa etapa do webServer para que o comando
      # `vite` inicie imediatamente, sem overhead de geração no timeout de boot.
      - name: Pre-generate E2E fixtures
        run: npm run e2e:generate-fixtures

      # ─── Dev server único para todos os Playwright steps ────────────────
      # Inicia Vite UMA VEZ como background service antes de qualquer step
      # Playwright. Cada step usa E2E_BASE_URL e NÃO gerencia webServer —
      # elimina a race condition onde o server morre entre steps (causa de
      # ERR_CONNECTION_REFUSED em 7 s no step de regression).
      - name: Start dev server (background)
        run: npm run dev &
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}

      - name: Wait for dev server to be ready
        run: timeout 120 bash -c 'until curl -sf http://localhost:8080 > /dev/null 2>&1; do sleep 1; done'

      # Auditoria: garantes que docs/E2E_SMOKE_COVERAGE.md está em dia com
      # _catalog.ts + SMOKE_COVERAGE. Falha se alguém alterou a suíte sem
      # regenerar o doc (`npm run e2e:smoke-coverage-doc`).
      - name: Validar doc de auditoria do smoke (drift check)
        run: node scripts/e2e-smoke-coverage-doc.mjs --check

      # Garantes que TODO test() no spec do smoke está sob describe @smoke.
      # Tests fora de describe @smoke seriam silenciosamente IGNORADOS pelo
      # gate (project chromium-smoke usa `grep: /@smoke/`). Falha CI cedo.
      - name: 🏷  Validar tags @smoke no spec do gate
        run: node scripts/check-smoke-tags.mjs

      # ─── SMOKE: fail-fast agressivo ─────────────────────────────────────
      # `--max-failures=1` para na PRIMEIRA falha (gate determinístico —
      # qualquer falha do smoke invalida o run; rodar mais é desperdício).
      # `--forbid-only` falha se algum spec tem `test.only` esquecido.
      # Reporter `github` emite annotations clicáveis no PR; `list` é
      # human-friendly no log; `json` alimenta o summary script.
      # NOTA T14: removida step duplicada com mesmo id (e2e_smoke) que fazia o
      # workflow inteiro falhar na validação YAML (run #25758508665, 2026-05-12)
      # — sem nenhum job dispatched. Mantida apenas a versão completa abaixo.
      # T14 UPDATE 3 (2026-05-22): adicionado `&& touch playwright-report/.smoke-passed`
      # para criar marker file SOMENTE quando `npx playwright test` retorna
      # exit 0 explícito. Gate determinístico via steps.outcome em vez de
      # `hashFiles()` (que era afetado por exit codes ruidosos do Playwright
      # mesmo com testes passando — visto no run 26311927286, sha 1fa53507,
      # onde smoke step rodou 2m54s success na API mas gate disparou false-positive).
      # T14 UPDATE 13: substituído `test -f` nos campos if: por steps.outcome
      # (test -f é shell command, não expressão GitHub Actions — causava
      # validation failure com 0 jobs despachados).
      - name: Run E2E smoke (gate — para na 1ª falha)
        id: e2e_smoke
        run: |
          mkdir -p playwright-report
          npx playwright test \
            --project=chromium-smoke \
            --max-failures=1 \
            --forbid-only \
            --reporter=github,list,json \
            && touch playwright-report/.smoke-passed
        env:
          E2E_BASE_URL: http://localhost:8080
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results.json
        continue-on-error: true

      # Resumo dedicado do smoke: 1 linha por funcionalidade no log do step,
      # `::error file=...::` por falha (anotação inline no PR), `::group::`
      # colapsável para diagnóstico, e bloco "FINAL SUMMARY" sem ANSI no fim.
      - name: 📋 Generate SMOKE summary (sempre — log final + annotations)
        if: always()
        run: node scripts/e2e-smoke-summary.mjs || true

      - name: 📤 Append SMOKE summary to GitHub UI
        if: always() && steps.e2e_smoke.outcome != 'skipped'
        run: |
          if test -f playwright-report/smoke-summary.md; then
            {
              echo "## 🚦 E2E Smoke Summary"
              echo ""
              cat playwright-report/smoke-summary.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # T14 UPDATE 3 (2026-05-22): step de diagnóstico para depurar discrepâncias
      # entre `outcome` (raw exit code antes de continue-on-error), `conclusion`
      # (após continue-on-error) e o marker file. Não-bloqueante. Sempre roda.
      # T14 UPDATE 4 (2026-05-22): expandido para commit automático do diagnóstico
      # em docs/redeploy/T14-AUTO-DEBUG.md via gh api. Permite leitura programática
      # via MCP github_get_contents sem precisar de download de artifact (que
      # exige auth). Usa [skip ci] na commit message para não disparar loop.
      # Só commita em push (não em PR) para evitar poluir histórico de PRs.
      - name: 🔍 Debug smoke gate state
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # T14 UPDATE 7: tee output para playwright-report/T14-step-log.txt
          # (uploaded como artifact mesmo se gh api falhar) + curl direto em
          # vez de gh api (para isolar se o problema é gh CLI ou auth/perm).
          set +e
          mkdir -p playwright-report
          exec > >(tee playwright-report/T14-step-log.txt) 2>&1

          echo "================================================================"
          echo "🔍 SMOKE GATE DIAGNOSTIC (T14 UPDATE 13)"
          echo "================================================================"
          echo "Run:        #${{ github.run_number }} (id ${{ github.run_id }})"
          echo "SHA:        ${{ github.sha }}"
          echo "Event:      ${{ github.event_name }}"
          echo "Outcome:    ${{ steps.e2e_smoke.outcome }}"
          echo "Conclusion: ${{ steps.e2e_smoke.conclusion }}"
          if [ -f playwright-report/.smoke-passed ]; then
            echo "Marker:     present (smoke exit 0)"
          else
            echo "Marker:     absent (smoke exit != 0)"
          fi
          echo ""
          echo "--- Environment ---"
          echo "  pwd: $(pwd)"
          echo "  GH_TOKEN length: ${#GH_TOKEN}"
          echo "  GITHUB_TOKEN length: ${#GITHUB_TOKEN}"
          echo "  which gh: $(which gh 2>&1)"
          echo "  which curl: $(which curl 2>&1)"
          echo ""
          echo "--- ls -la playwright-report/ ---"
          ls -la playwright-report/ 2>/dev/null | head -50
          echo ""
          echo "--- find playwright-report -type f ---"
          find playwright-report -type f 2>/dev/null | head -30
          echo ""
          echo "--- head -100 smoke-summary.md ---"
          head -100 playwright-report/smoke-summary.md 2>/dev/null
          echo "================================================================"

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "(skipping auto-commit — event is ${{ github.event_name }}, not push)"
            exit 0
          fi

          REPO="${{ github.repository }}"
          RUN_NUM="${{ github.run_number }}"
          MSG="auto-diag: run #$RUN_NUM [skip ci]"

          # ============================================================
          # PROBE A: curl direto (não depende do gh CLI)
          # ============================================================
          echo ""
          echo "=== PROBE A: curl direct heartbeat ==="
          HEARTBEAT_PATH="docs/redeploy/auto-debug/T14-heartbeat-latest.md"
          printf "# T14 heartbeat\n\nRun #%s at %s\nSHA: %s\n" "$RUN_NUM" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${{ github.sha }}" > /tmp/heartbeat.md
          HEARTBEAT_B64=$(base64 -w0 /tmp/heartbeat.md)

          echo "Heartbeat content (cat):"
          cat /tmp/heartbeat.md
          echo "---"
          echo "Base64 length: ${#HEARTBEAT_B64}"

          # GET sha via curl
          GET_HTTP=$(curl -sS -o /tmp/heartbeat_get.json -w "%{http_code}" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPO/contents/$HEARTBEAT_PATH")
          echo "GET HTTP: $GET_HTTP"
          echo "GET response (first 200 chars): $(head -c 200 /tmp/heartbeat_get.json)"

          EXISTING_SHA=$(python3 -c "import json; d=json.load(open('/tmp/heartbeat_get.json'));  print(d.get('sha','') if isinstance(d, dict) else '')" 2>/dev/null || echo "")
          echo "Existing SHA: '$EXISTING_SHA'"

          # Build PUT body via python (one-liner)
          if [ -n "$EXISTING_SHA" ]; then
            python3 -c "import json; print(json.dumps({'message':'$MSG','content':'$HEARTBEAT_B64','sha':'$EXISTING_SHA'}))" > /tmp/put_body.json
          else
            python3 -c "import json; print(json.dumps({'message':'$MSG','content':'$HEARTBEAT_B64'}))" > /tmp/put_body.json
          fi
          echo "PUT body size: $(wc -c < /tmp/put_body.json) bytes"

          PUT_HTTP=$(curl -sS -X PUT -o /tmp/heartbeat_put.json -w "%{http_code}" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" --data-binary @/tmp/put_body.json "https://api.github.com/repos/$REPO/contents/$HEARTBEAT_PATH")
          echo "PUT HTTP: $PUT_HTTP"
          echo "PUT response (first 500 chars): $(head -c 500 /tmp/heartbeat_put.json)"

          if [ "$PUT_HTTP" = "200" ] || [ "$PUT_HTTP" = "201" ]; then
            echo "✓ Heartbeat committed successfully (HTTP $PUT_HTTP)"
          else
            echo "✗ Heartbeat FAILED (HTTP $PUT_HTTP)"
          fi

          # ============================================================
          # PROBE B: diagnostic files via curl
          # ============================================================
          echo ""
          echo "=== PROBE B: Diagnostic file commits via curl ==="
          commit_via_curl() {
            local local_path="$1"
            local repo_path="$2"

            if [ ! -f "$local_path" ]; then
              echo "  [$local_path] does not exist locally — skipped"
              return 0
            fi

            local file_size
            file_size=$(stat -c%s "$local_path" 2>/dev/null || echo "0")
            echo "  [$local_path] exists, size=$file_size bytes"

            if [ "$file_size" -gt 5000000 ]; then
              echo "    skipping — file > 5 MB"
              return 0
            fi

            local content_b64
            content_b64=$(base64 -w0 "$local_path")

            local get_http
            get_http=$(curl -sS -o /tmp/get.json -w "%{http_code}" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPO/contents/$repo_path")
            local existing_sha=""
            if [ "$get_http" = "200" ]; then
              existing_sha=$(python3 -c "import json; print(json.load(open('/tmp/get.json')).get('sha',''))" 2>/dev/null || echo "")
            fi
            echo "    existing SHA: '$existing_sha' (GET HTTP $get_http)"

            if [ -n "$existing_sha" ]; then
              python3 -c "import json; print(json.dumps({'message':'$MSG','content':'$content_b64','sha':'$existing_sha'}))" > /tmp/put_body.json
            else
              python3 -c "import json; print(json.dumps({'message':'$MSG','content':'$content_b64'}))" > /tmp/put_body.json
            fi

            local put_http
            put_http=$(curl -sS -X PUT -o /tmp/put.json -w "%{http_code}" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" --data-binary @/tmp/put_body.json "https://api.github.com/repos/$REPO/contents/$repo_path")

            if [ "$put_http" = "200" ] || [ "$put_http" = "201" ]; then
              echo "    ✓ committed (HTTP $put_http) to $repo_path"
            else
              echo "    ✗ failed (HTTP $put_http): $(head -c 300 /tmp/put.json)"
            fi
          }

          commit_via_curl playwright-report/results.json       "docs/redeploy/auto-debug/T14-results-latest.json"
          commit_via_curl playwright-report/smoke-summary.md   "docs/redeploy/auto-debug/T14-smoke-summary-latest.md"
          commit_via_curl playwright-report/smoke-summary.json "docs/redeploy/auto-debug/T14-smoke-summary-latest.json"

          echo ""
          echo "Done."

      # T14 UPDATE 13: substituído `test -f playwright-report/.smoke-passed`
      # por `steps.e2e_smoke.outcome != 'success'` — expressão GitHub Actions válida.
      - name: 🛑 Fail-fast se smoke falhou (gate)
        if: steps.e2e_smoke.outcome != 'success'
        run: |
          echo "::error title=Smoke gate failed::Smoke parou na 1ª falha — veja '🚦 E2E Smoke Summary' acima e o artifact 'playwright-report' (screenshots+vídeos+trace)."
          exit 1

      # ─── HEADER STICKY GATE ─────────────────────────────────────────────
      # Spec dedicado `e2e/flows/22-header-sticky.spec.ts` que valida que o
      # `<header data-testid="app-header">` permanece `position: sticky` em
      # y≈0 ao rolar — em todas as rotas autenticadas estáticas do catálogo,
      # × 3 viewports (mobile/tablet/desktop), + cenários de pós-login e
      # navegação encadeada entre módulos.
      #
      # Fail-fast (`--max-failures=1`): qualquer regressão de sticky
      # invalida o run. Reporter `github` cria annotation clicável no PR
      # apontando o spec exato; `list` deixa o log human-readable.
      # T14 UPDATE 13: condicional usa steps.e2e_smoke.outcome (expressão
      # GitHub Actions válida) em vez de `test -f` (shell command inválido).
      - name: 🧲 Run E2E header-sticky gate (fail-fast por rota/viewport)
        id: e2e_header_sticky
        if: steps.e2e_smoke.outcome == 'success'
        run: |
          npx playwright test \
            e2e/flows/22-header-sticky.spec.ts \
            --max-failures=1 \
            --reporter=github,list \
            && touch playwright-report/.header-sticky-passed
        env:
          E2E_BASE_URL: http://localhost:8080
        continue-on-error: true

      # T14 UPDATE 13: condicional usa steps.outcome (expressão válida).
      - name: 🛑 Fail-fast se header sticky falhou
        if: steps.e2e_smoke.outcome == 'success' && steps.e2e_header_sticky.outcome != 'success'
        run: |
          echo "::error title=Header sticky regression::O Header global deixou de ser sticky em alguma rota/viewport. Spec: e2e/flows/22-header-sticky.spec.ts. Causa raiz típica: 'overflow' / 'transform' / 'filter' em ancestral do <header> em src/components/layout/MainLayout.tsx criando scroll container ou stacking context indevido. Veja o artifact 'playwright-report' (screenshot + vídeo + trace) para a rota específica."
          exit 1

      # ─── REGRESSION: registra TUDO ──────────────────────────────────────
      # SEM --max-failures: queremos diagnóstico completo. SEM --forbid-only
      # (já validado no smoke). Reporter `line` é compacto e mostra todos
      # os resultados; `html` para drill-down; `json`/`junit` para tooling.
      # `--pass-with-no-tests` evita falhar se nenhum spec casar (ex: PR só
      # mexe em smoke).
      # Requer E2E_USER_EMAIL configurado — specs autenticados falham sem
      # credenciais. Quando ausente, step é skipped e o job passa normalmente.
      # T14 UPDATE 13: condicional usa steps.outcome + env.E2E_USER_EMAIL (expressões válidas).
      - name: Run E2E regression (cobertura completa — registra todas as falhas)
        if: steps.e2e_smoke.outcome == 'success' && steps.e2e_header_sticky.outcome == 'success' && env.E2E_USER_EMAIL != ''
        run: |
          # Sem credenciais de autenticação, limita à suíte pública (routes-public)
          # para evitar que centenas de testes autenticados falhem com redirect para
          # /login e estourem o timeout do job. Quando as credenciais estiverem
          # disponíveis, roda a cobertura completa normalmente.
          if [ -n "$E2E_USER_EMAIL" ] && [ -n "$E2E_USER_PASSWORD" ]; then
            npx playwright test \
              --grep-invert @smoke \
              --pass-with-no-tests \
              --reporter=github,line,html,json,junit
          else
            npx playwright test \
              --project=routes-public \
              --grep-invert @smoke \
              --pass-with-no-tests \
              --reporter=github,line,html,json,junit
          fi
        env:
          E2E_BASE_URL: http://localhost:8080
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results.json
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: playwright-report/results.xml
        continue-on-error: true
        id: e2e_run

      - name: 📋 Generate feature summary (regression)
        if: always()
        run: node scripts/e2e-feature-summary.mjs || true

      - name: 📤 Append feature summary to GitHub UI
        if: always() && steps.e2e_run.outcome != 'skipped'
        run: |
          if test -f playwright-report/feature-summary.md; then
            {
              echo "## 🧪 E2E Feature Summary (regression)"
              echo ""
              cat playwright-report/feature-summary.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report
          retention-days: ${{ fromJSON(env.ARTIFACT_RETENTION_DAYS) }}

      - name: Upload smoke summary (markdown + json)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-smoke-summary
          path: |
            playwright-report/smoke-summary.md
            playwright-report/smoke-summary.json
          retention-days: ${{ fromJSON(env.ARTIFACT_RETENTION_DAYS) }}
          if-no-files-found: ignore

      - name: Upload feature summary (markdown)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-feature-summary
          path: playwright-report/feature-summary.md
          retention-days: ${{ fromJSON(env.ARTIFACT_RETENTION_DAYS) }}
          if-no-files-found: ignore

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-evidence
          path: |
            e2e-artifacts
            test-results
          retention-days: ${{ fromJSON(env.ARTIFACT_RETENTION_DAYS) }}

      # Gate final do job: o smoke já falhou cedo (Fail-fast acima), aqui
      # apenas falhamos se a regression registrou alguma falha. Mensagem
      # nomeia explicitamente onde olhar.
      - name: 🛑 Fail job se regression registrou falhas
        if: steps.e2e_run.outcome == 'failure'
        run: |
          echo "::error title=Regression failed::Algumas specs falharam — veja '🧪 E2E Feature Summary' acima, artifacts 'playwright-report' (HTML) e 'e2e-evidence' (screenshots/vídeos/trace)."
          exit 1
