# Workflow: regenera src/integrations/supabase/types.ts via supabase CLI.
# Disparado manualmente via Actions UI (workflow_dispatch).
#
# Pre-requisito: secret SUPABASE_ACCESS_TOKEN no repo.
# Gere o token em https://supabase.com/dashboard/account/tokens
#
# Uso apos merge:
#   Actions tab -> Regenerate Supabase Types -> Run workflow -> branch main
#
# O workflow:
#   1. Regenera types.ts via supabase gen types
#   2. Remove continue-on-error de lint-untyped-from.yml (promove a required)
#   3. Roda o lint local pra validar
#   4. Commita em branch nova e abre PR
#
# Pode ser usado a qualquer momento pra sincronizar types.ts com o schema do banco.

name: Regenerate Supabase Types

on:
  workflow_dispatch:
    inputs:
      promote_lint:
        description: 'Remover continue-on-error de lint-untyped-from.yml (one-shot, primeira execucao)'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    name: Regenerate types and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check SUPABASE_ACCESS_TOKEN secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN nao configurado."
            echo "Adicione em Settings -> Secrets and variables -> Actions"
            echo "Gere o token em https://supabase.com/dashboard/account/tokens"
            exit 1
          fi

      - name: Regenerate types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          old=$(wc -l < src/integrations/supabase/types.ts | tr -d ' ')
          supabase gen types typescript --project-id doufsxqlfjyuvxuezpln > types.ts.new
          mv types.ts.new src/integrations/supabase/types.ts
          new=$(wc -l < src/integrations/supabase/types.ts | tr -d ' ')
          echo "types.ts: $old -> $new linhas"
          echo "OLD_LINES=$old" >> $GITHUB_ENV
          echo "NEW_LINES=$new" >> $GITHUB_ENV

      - name: Promote lint to required
        if: inputs.promote_lint
        run: |
          python3 -c "
          import re
          p = '.github/workflows/lint-untyped-from.yml'
          c = open(p).read()
          new = re.sub(r'\n    # TODO.*?\n    continue-on-error: true\n', '\n', c, flags=re.DOTALL)
          if new == c:
              new = re.sub(r'\n    continue-on-error: true\n', '\n', c)
          if new == c:
              print('::warning::continue-on-error not found, lint may already be required')
          else:
              open(p, 'w').write(new)
              print('continue-on-error removido (lint agora eh required)')
          "

      - name: Run lint locally
        run: bash scripts/lint-untyped-from.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "::warning::Nenhuma mudanca - types.ts ja estava sincronizado"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Write PR body
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          mkdir -p /tmp/pr
          cat > /tmp/pr/body.md << 'BODYEOF'
          Regenera `src/integrations/supabase/types.ts` via supabase CLI.

          Auto-gerado por `.github/workflows/regenerate-supabase-types.yml`.

          ## Mudancas

          - `types.ts`: regenerado via `supabase gen types typescript --project-id doufsxqlfjyuvxuezpln`
          - `lint-untyped-from.yml`: `continue-on-error: true` removido se ainda presente (promovido a required)

          ## Validacao

          Lint rodou local no runner e passou.

          Auto-aplicado via Claude MCP.
          BODYEOF

      - name: Commit, push, and open PR
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/regenerate-types-$(date -u +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/integrations/supabase/types.ts .github/workflows/lint-untyped-from.yml || true
          git commit -m "chore: regenerate supabase types ($OLD_LINES -> $NEW_LINES linhas)" \
                     -m "Auto-aplicado via workflow regenerate-supabase-types.yml"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: regenerate supabase types" \
            --body-file /tmp/pr/body.md
