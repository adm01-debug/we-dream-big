name: Edge Integration Tests — All Functions

# Roda testes de integração mocked para TODAS as 18+ edge functions cobertas.
# Bloqueia merges se qualquer função crítica falhar.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: edge-integration-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: America/Sao_Paulo

jobs:
  edge-integration:
    name: Edge Function Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Roda todos os 18+ testes de integração de edge functions (mocked).
      # Cada teste valida: status codes, shapes de resposta, CORS, auth, inputs adversariais.
      - name: Run all edge function integration tests
        run: |
          npx vitest run tests/edge-functions/integration/ \
            --reporter=verbose \
            --coverage \
            --coverage.reporter=json-summary \
            --coverage.reporter=text \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.branches=0 \
            --coverage.thresholds.statements=0

      - name: Generate coverage summary for edge tests
        if: always()
        run: node scripts/generate-coverage-report.mjs || true

      - name: Upload edge integration coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: edge-integration-coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

  edge-fuzz-dry-run:
    name: Fuzz Testing — Dry Run (sem credenciais)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: edge-integration

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run base fuzz tests (dry-run)
        run: node scripts/fuzz-testing.mjs
        env:
          FUZZ_CONCURRENCY: "3"

      - name: Run upload + webhook fuzz tests (dry-run)
        run: node scripts/fuzz-edge-uploads.mjs

  edge-fuzz-live:
    name: Fuzz Testing — Live (com credenciais)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: edge-integration
    if: >
      vars.SUPABASE_URL != '' &&
      secrets.SUPABASE_SERVICE_ROLE_KEY != ''

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fuzz tests against live Supabase
        run: node scripts/fuzz-testing.mjs
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FUZZ_CONCURRENCY: "3"

      - name: Run upload fuzz tests against live Supabase
        run: node scripts/fuzz-edge-uploads.mjs
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
