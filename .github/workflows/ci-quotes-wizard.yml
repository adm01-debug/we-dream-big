name: CI - Novo Orçamento E2E

on:
  push:
    branches: [main]
    paths:
      - 'src/pages/quotes/**'
      - 'src/hooks/quotes/**'
      - 'src/logic/quotes/**'
      - 'src/components/quotes/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/pages/quotes/**'
      - 'src/hooks/quotes/**'
      - 'src/logic/quotes/**'
      - 'src/components/quotes/**'
  workflow_dispatch:

env:
  TZ: America/Sao_Paulo
  CI: "true"

jobs:
  validate-quotes:
    name: Validação Novo Orçamento
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run logic and wizard tests
        run: npx vitest run src/logic/quotes/__tests__/calculations.test.ts src/pages/quotes/QuoteBuilder.e2e.test.tsx --reporter=verbose
        # continue-on-error é false por padrão, então falhará o build se os testes falharem
