name: Visual Baseline Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  visual-baseline:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Visual Tests
      run: npx playwright test e2e/flows/99-auth-ui-baseline.spec.ts
      env:
        CI: true

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Auto-update Baseline (Optional)
      if: failure() && github.event_name == 'pull_request'
      run: |
        echo "Visual regression detected. If this is expected, run 'npm run test:baseline-update' locally."
