name: Visual Baseline Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  visual-baseline:
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Clear Cache & Artifacts
      run: |
        rm -rf e2e-artifacts/
        rm -rf playwright-report/
        rm -rf test-results/

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Visual Tests
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} e2e/flows/99-auth-ui-baseline.spec.ts e2e/flows/supplier-comparison-visual.spec.ts e2e/flows/31-promoflix-player.spec.ts e2e/tooltips-a11y.spec.ts e2e/optimized-image-visual.spec.ts e2e/routes/app/replenishment-grid-visual.spec.ts e2e/routes/app/novelty-grid-visual.spec.ts e2e/routes/app/novelty-card-variations.spec.ts
      env:
        CI: true

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: playwright-report-${{ matrix.shardIndex }}
        path: playwright-report/
        retention-days: 30

    - name: Auto-update Baseline (Optional)
      if: failure() && github.event_name == 'pull_request'
      run: |
        echo "Visual regression detected. If this is expected, run 'npm run test:baseline-update' locally."
