# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Config CodeRabbit - Promo Brindes (Promo_Gifts)
# Revisões automáticas de PR em PT-BR

language: "pt-BR"

tone_instructions: |
  Português BR direto e prático. Foco em bugs, segurança, performance e regressões. Evite nitpicks de estilo. Prioridade alta: secrets hardcoded, SQL injection, promises sem await/catch, any sem narrowing, drops sem backup.

early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - "main"
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "[skip review]"

  path_filters:
    - "!**/*.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/package-lock.json"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/node_modules/**"
    - "!**/*.min.js"
    - "!**/*.bundle.js"
    - "!**/coverage/**"

  path_instructions:
    - path: "supabase/functions/**/*.ts"
      instructions: |
        Edge Functions Supabase em produção. Verificar com rigor:
        - Secrets sempre via Deno.env.get(), NUNCA hardcoded
        - Tratamento de erro não pode vazar tokens, SQL ou credenciais no response
        - Validação de payload em webhooks (shared secret, assinatura HMAC quando aplicável)
        - Idempotência em endpoints que recebem retries (Bitrix24, Evolution API, etc)
        - CORS configurado para origem esperada, não wildcard em produção
        - Rate limiting ou debouncing onde fizer sentido
        - Logs não devem incluir payloads completos com dados sensíveis

        ⚠️ ALERTA DE DRIFT: se o título do PR ou mensagens de commit contiverem
        "Fast Visual Edit", "visual", "stepper", "header", "layout", "centralizou",
        "moveu" ou similares (típicos de Lovable) E houver mudanças neste path,
        FLAG explicitamente no review. Edge functions são lógica de produção —
        refactors aqui exigem PR dedicado, NUNCA rotulado como mudança visual.
        Histórico (26/05/2026, PR #460): refactor mascarado de "Fast Visual Edit"
        removeu versionamento v1/v2, allowlist legada, headers Deprecation/Sunset
        e métrica de adoção do webhook-inbound sem aviso. Verificar se features
        foram removidas: contract version (v1/v2), HMAC validation, rate limiting,
        idempotency, métricas estruturadas.
    - path: "supabase/migrations/**/*.sql"
      instructions: |
        Migrations Supabase. Verificar:
        - Operações destrutivas (DROP TABLE/COLUMN, TRUNCATE) DEVEM ter backup em tabela _backup_*_YYYYMMDD antes
        - RLS policies não devem ser desabilitadas sem justificativa explícita no comentário
        - Funções com SECURITY DEFINER apenas quando absolutamente necessário e com search_path explícito
        - ALTER COLUMN com mudança de tipo incompatível precisa de USING clause
        - Indices em colunas usadas em policies de RLS para performance

        ⚠️ ALERTA DE DRIFT: se o título do PR ou mensagens de commit contiverem
        "Fast Visual Edit", "visual", "stepper", "header", "layout", "centralizou",
        "moveu" ou similares (típicos de Lovable) E houver mudanças neste path,
        FLAG explicitamente. Migrations modificam o estado do banco — NUNCA são
        mudança visual. Verificar especialmente:
        - DROP POLICY em massa: validar que função referenciada existe com a
          assinatura correta (caso real: 141234 chamava can_view_all_sales(uuid)
          quando função tem 0 args — teria falhado em runtime).
        - ADD COLUMN com IF NOT EXISTS em coluna que já existe NOT NULL é
          silenciosamente no-op mas INDUZ EM ERRO o leitor.
        - SECURITY DEFINER sem REVOKE explícito de PUBLIC/anon/authenticated.

    - path: "**/*.{json,html,toml,yaml,yml,sh,sql,ts,tsx,js,jsx,md,css}"
      instructions: |
        Detecção de conteúdo acidentalmente base64-encoded.
        Se um arquivo texto contém apenas UMA linha longa (>200 chars) composta
        de caracteres do alfabeto base64 ([A-Za-z0-9+/=]), FLAG como provável
        bug de codificação. Esse padrão ocorreu 3x neste repo (PRs #319, #457,
        #459) sempre quebrando build Vercel silenciosamente. O workflow
        `detect-base64-content.yml` faz a verificação automática, mas reforce
        no review se notar.
    - path: "**/*.{ts,tsx,js,jsx}"
      instructions: |
        Código TypeScript/JavaScript. Verificar:
        - any/unknown sem narrowing posterior
        - Promises sem await ou .catch()
        - Tokens, secrets ou URLs de API hardcoded (mover para env)
        - Loops infinitos potenciais (while sem break, recursão sem caso base)
        - Memory leaks (event listeners não removidos, intervalos não limpos)

  tools:
    gitleaks:
      enabled: true
    eslint:
      enabled: true
    biome:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    shellcheck:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
